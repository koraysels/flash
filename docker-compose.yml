services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    networks:
      - flash                 # internal only — never exposed to host or Traefik

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - flash                 # talks to backend
      - traefik               # reachable by the shared Traefik instance
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.flash.rule=Host(`${FLASH_DOMAIN}`)
      - traefik.http.routers.flash.entrypoints=websecure
      - traefik.http.routers.flash.tls.certresolver=letsencrypt
      - traefik.http.services.flash.loadbalancer.server.port=80

networks:
  flash:
    driver: bridge
  traefik:
    external: true            # created by the shared Traefik stack
    name: traefik
