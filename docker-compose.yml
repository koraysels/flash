services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT:-3001}
      NODE_ENV: ${NODE_ENV:-production}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - flash

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FLASH_PORT:-8080}:80"
    networks:
      - flash

networks:
  flash:
    driver: bridge
