services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    # Not exposed to the host — nginx reaches it via the flash network.
    # Exposing 3001 directly would bypass UFW (Docker writes iptables directly).
    networks:
      - flash

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"   # bind to loopback only; your reverse proxy (Caddy/nginx) forwards here
    depends_on:
      - backend
    networks:
      - flash

networks:
  flash:
    driver: bridge
